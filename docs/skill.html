<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>技能</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f4f1;
      --panel: #ffffff;
      --panel-soft: #fbfbf9;
      --text: #111111;
      --muted: #666666;
      --line: #ddddda;
      --line-strong: #c8c8c2;
      --shadow: rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(0, 0, 0, 0.035), transparent 26%),
        linear-gradient(180deg, #ffffff 0%, #fafaf8 18%, var(--bg) 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 28px 18px 52px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 20px;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    .intro {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      white-space: nowrap;
    }

    .home-link:hover {
      border-color: var(--line-strong);
      background: #ffffff;
    }

    .status {
      margin: 0 0 18px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--muted);
      font-size: 14px;
    }

    .sections {
      display: grid;
      gap: 18px;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 14px 38px var(--shadow);
      overflow: hidden;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff, var(--panel-soft));
    }

    .section-title {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
    }

    .section-meta {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .empty {
      padding: 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .table-wrap::-webkit-scrollbar {
      height: 12px;
    }

    .table-wrap::-webkit-scrollbar-track {
      background: #ecece8;
    }

    .table-wrap::-webkit-scrollbar-thumb {
      background: #bcbcb5;
      border-radius: 999px;
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    thead th {
      background: #121212;
      color: #fbfbfb;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 12px;
      white-space: nowrap;
    }

    tbody tr:nth-child(even) {
      background: rgba(0, 0, 0, 0.018);
    }

    tbody tr:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    @media (max-width: 720px) {
      .topbar,
      .section-head {
        flex-direction: column;
        align-items: start;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div>
        <span class="eyebrow">資料檢視</span>
        <h1>技能</h1>
        <p class="intro">顯示 skill.json 的分頁資料。</p>
      </div>
      <a class="home-link" href="./index.html">回首頁</a>
    </div>

    <p id="status" class="status">載入中...</p>
    <div id="sections" class="sections"></div>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const sectionsEl = document.getElementById("sections");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatValue(value) {
      if (value === null || value === undefined || value === "") return '<span class="empty">-</span>';
      if (Array.isArray(value)) return value.length ? value.map((item) => escapeHtml(item)).join("<br>") : '<span class="empty">[]</span>';
      return escapeHtml(value);
    }

    function inferKeys(items) {
      const first = items.find((item) => item && typeof item === "object");
      return first ? Object.keys(first) : [];
    }

    function renderTable(items) {
      const keys = inferKeys(items);
      if (!keys.length) return "";
      const head = keys.map((key) => `<th>${escapeHtml(key)}</th>`).join("");
      const body = items.map((item) => `<tr>${keys.map((key) => `<td>${formatValue(item[key])}</td>`).join("")}</tr>`).join("");
      return `<div class="table-wrap"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
    }

    function renderSection(name, value) {
      const section = document.createElement("section");
      section.className = "section";
      const items = Array.isArray(value) ? value : [];
      section.innerHTML = `<div class="section-head"><div><h2 class="section-title">${escapeHtml(name)}</h2><p class="section-meta">資料表</p></div><div class="count">${items.length} 筆</div></div>${items.length ? renderTable(items) : '<div class="empty">沒有資料</div>'}`;
      sectionsEl.appendChild(section);
    }

    async function loadSkills() {
      try {
        const response = await fetch("./dataset/skill.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        sectionsEl.innerHTML = "";
        Object.entries(data).forEach(([name, value]) => renderSection(name, value));
        statusEl.textContent = `已載入 ${Object.keys(data).length} 個分類`;
      } catch (error) {
        statusEl.textContent = `載入失敗：${error.message}`;
        sectionsEl.innerHTML = "";
      }
    }

    loadSkills();
  </script>
</body>
</html>
