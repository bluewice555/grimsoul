<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Monster Dataset</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --panel: #fff;
      --text: #111;
      --muted: #666;
      --line: #ddd;
      --line-strong: #bbb;
      --shadow: rgba(0,0,0,.06);
      --head: #111;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg,#fff 0%,#fafafa 20%,var(--bg) 100%);
    }
    .page { max-width: 1680px; margin: 0 auto; padding: 26px 18px 44px; }
    .topbar { display: flex; justify-content: space-between; align-items: end; gap: 16px; margin-bottom: 14px; }
    .eyebrow { color: var(--muted); font-size: 11px; letter-spacing: .12em; font-weight: 700; text-transform: uppercase; }
    h1 { margin: 6px 0 0; font-size: clamp(28px, 4.6vw, 50px); line-height: 1; letter-spacing: -.03em; }
    .intro { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
    .home { text-decoration: none; color: var(--text); border: 1px solid var(--line); border-radius: 999px; padding: 9px 13px; background: #fff; }
    .home:hover { border-color: var(--line-strong); }
    .status,.card { border: 1px solid var(--line); border-radius: 18px; background: var(--panel); box-shadow: 0 12px 34px var(--shadow); }
    .status { margin: 0 0 12px; padding: 10px 12px; color: var(--muted); font-size: 14px; }
    .card { padding: 14px; }
    .meta { margin: 0 0 10px; color: var(--muted); font-size: 13px; }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 14px; }
    table { width: max-content; min-width: 1900px; border-collapse: collapse; }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 11px;
      text-align: left;
      vertical-align: top;
      font-size: 12px;
      line-height: 1.4;
      white-space: nowrap;
    }
    th {
      position: sticky; top: 0; z-index: 2;
      background: var(--head); color: #fff;
      letter-spacing: .03em; font-size: 11px;
    }
    tr:nth-child(even) td { background: #fcfcfc; }
    .name-cell { font-weight: 600; }
    .empty { color: #9a9a9a; }
    .json { white-space: pre-wrap; line-height: 1.35; }
    @media (max-width: 720px) {
      .page { padding: 18px 10px 34px; }
      .topbar { flex-direction: column; align-items: stretch; }
      .home { width: fit-content; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div>
        <div class="eyebrow">Dataset Viewer</div>
        <h1>Monster</h1>
        <p class="intro">顯示 <code>docs/dataset/monster.json</code>（含巢狀子母分類欄位）。</p>
      </div>
      <a class="home" href="./index.html">回首頁</a>
    </div>

    <p id="status" class="status">載入中...</p>

    <div class="card">
      <p id="meta" class="meta">讀取 dataset/monster.json</p>
      <div class="table-wrap">
        <table>
          <thead><tr id="table-head"></tr></thead>
          <tbody id="table-body"><tr><td class="empty">載入中...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const metaEl = document.getElementById('meta');
    const tableHead = document.getElementById('table-head');
    const tableBody = document.getElementById('table-body');

    function escapeHtml(v) {
      return String(v)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatValue(v) {
      if (v === null || v === undefined || v === '') return '<span class="empty">-</span>';
      if (typeof v === 'object') {
        return `<span class="json">${escapeHtml(JSON.stringify(v, null, 2))}</span>`;
      }
      return escapeHtml(v);
    }

    function collectKeys(rows) {
      const set = new Set();
      for (const row of rows) {
        for (const k of Object.keys(row || {})) set.add(k);
      }
      const preferred = [
        'row',
        'ID',
        'Enemy',
        'Health',
        'Armor (Est.)',
        'Damage Reduction (%)',
        'Physical ATK',
        'Elemental ATK',
        'Special Mechanic(s) Summary',
        'Common Location(s)',
        'Soul Eater',
        "Thunder God's Knuckledusters",
        'Human / Monster',
        'Instakill',
        'Fracture',
        'Elemental Modifier',
        'Elemental DoT Modifier',
        'Crowd Control'
      ];
      const rest = [...set].filter(k => !preferred.includes(k)).sort();
      return preferred.filter(k => set.has(k)).concat(rest);
    }

    function renderTable(keys, rows) {
      if (!keys.length || !rows.length) {
        tableHead.innerHTML = '';
        tableBody.innerHTML = '<tr><td class="empty">沒有資料</td></tr>';
        return;
      }
      tableHead.innerHTML = keys.map(k => `<th>${escapeHtml(k)}</th>`).join('');
      tableBody.innerHTML = rows.map(row => {
        const cols = keys.map((k, i) => `<td class="${i <= 2 ? 'name-cell' : ''}">${formatValue(row[k])}</td>`).join('');
        return `<tr>${cols}</tr>`;
      }).join('');
    }

    async function loadData() {
      try {
        const res = await fetch('./dataset/monster.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const rows = Array.isArray(data) ? data : [];
        const keys = collectKeys(rows);
        renderTable(keys, rows);
        statusEl.textContent = '載入完成';
        metaEl.textContent = `dataset/monster.json，筆數：${rows.length}`;
      } catch (err) {
        statusEl.textContent = `載入失敗：${err.message}`;
        metaEl.textContent = '請確認 docs/dataset/monster.json 是否存在';
      }
    }

    loadData();
  </script>
</body>
</html>
