<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Dataset Viewer</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --panel: #fff;
      --text: #101216;
      --muted: #69707d;
      --line: #dcdfe4;
      --head: #12161d;
      --shadow: rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg,#fff 0%,#f9fafb 20%,var(--bg) 100%);
    }
    .page { max-width: 1700px; margin: 0 auto; padding: 26px 18px 44px; }
    .top {
      display: flex; align-items: end; justify-content: space-between; gap: 16px; margin-bottom: 14px;
    }
    .kicker { font-size: 11px; letter-spacing: .13em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
    h1 { margin: 6px 0 0; font-size: clamp(30px, 5vw, 54px); line-height: 1; letter-spacing: -.03em; }
    .intro { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
    .home { text-decoration: none; color: var(--text); border: 1px solid var(--line); border-radius: 999px; padding: 9px 14px; background: #fff; }
    .home:hover { border-color: #b8bec8; }
    .toolbar {
      border: 1px solid var(--line); border-radius: 16px; background: var(--panel); box-shadow: 0 12px 32px var(--shadow);
      padding: 12px; display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap;
    }
    .toolbar-right {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .toolbar.editing {
      border-color: #1f7a45;
      box-shadow: 0 12px 32px rgba(31,122,69,.16);
      background: #f4fff8;
    }
    label { font-size: 13px; color: var(--muted); }
    select {
      min-width: 260px; padding: 8px 10px; border-radius: 10px; border: 1px solid var(--line); background: #fff; color: var(--text);
    }
    .status { color: var(--muted); font-size: 13px; }
    .btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 10px;
      background: #fff;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }
    .btn:hover { border-color: #b8bec8; }
    .btn.primary {
      border-color: #1f7a45;
      background: #1f7a45;
      color: #fff;
    }
    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    .table-wrap {
      border: 1px solid var(--line); border-radius: 16px; background: var(--panel); box-shadow: 0 12px 32px var(--shadow);
      overflow: auto;
    }
    .root-lists-wrap {
      margin-bottom: 12px;
    }
    .root-list-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      background: #fff;
    }
    .root-list-head {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .root-list-table-wrap { overflow: auto; }
    .root-list-table th { position: static; background: #f5f6f8; color: #2b3240; }
    .root-list-table {
      width: 100%;
      min-width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      border: 1px solid var(--line);
    }
    .root-list-table td, .root-list-table th {
      border: 1px solid var(--line);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    table { width: max-content; min-width: 100%; border-collapse: collapse; }
    th, td {
      padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; font-size: 12px; line-height: 1.45; white-space: nowrap;
    }
    th { position: sticky; top: 0; z-index: 2; background: var(--head); color: #fff; font-size: 11px; letter-spacing: .03em; }
    tbody tr:nth-child(even) td { background: #fcfcfd; }
    .json { white-space: pre-wrap; line-height: 1.35; }
    .empty { color: #9aa2ad; }
    code { font-family: Consolas, "Courier New", monospace; }
  </style>
</head>
<body>
  <main class="page">
    <div class="top">
      <div>
        <div class="kicker">Dataset</div>
        <h1>Dataset Viewer</h1>
        <p class="intro">單一頁面瀏覽所有可用 dataset。</p>
      </div>
      <a class="home" href="./index.html">回首頁</a>
    </div>

    <div class="toolbar">
      <label for="dataset-select">資料集：</label>
      <select id="dataset-select"></select>
      <label><input id="show-debug-toggle" type="checkbox" /> 顯示 DEBUG</label>
      <span id="meta-filters"></span>
      <div class="toolbar-right">
        <button id="open-file-btn" class="btn" type="button">開啟檔案（編輯）</button>
        <button id="copy-path-btn" class="btn" type="button">複製路徑</button>
      </div>
      <button id="flush-btn" class="btn primary" type="button" disabled>寫入 Flush</button>
      <span id="status" class="status">載入中...</span>
    </div>

    <div id="root-lists" class="root-lists-wrap" style="display:none;"></div>
    <div id="named-tables" class="root-lists-wrap" style="display:none;"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr id="head-top"></tr>
          <tr id="head-sub"></tr>
        </thead>
        <tbody id="body"><tr><td class="empty">載入中...</td></tr></tbody>
      </table>
    </div>
  </main>

  <script>
    /** 
     * MVC - Constants & Utility
     */
    const CONFIG = {
      DATASETS: [
        { id: 'armor-items', label: 'armor items', file: './dataset/raw/armor-items.json' },
        { id: 'armor-set-effects', label: 'armor sets', file: './dataset/raw/armor-set-effects.json' },
        { id: 'armor-sets', label: 'armor sheet', file: './dataset/raw/armor-sets.json' },
        { id: 'monster', label: 'monster', file: './dataset/raw/monster.json' },
        { id: 'materials', label: 'materials', file: './dataset/raw/materials.json' },
        { id: 'recipes', label: 'recipes', file: './dataset/raw/recipes.json' },
        { id: 'harvest', label: 'harvest', file: './dataset/value/harvest.json' },
        { id: 'mapping', label: 'mapping', file: './dataset/value/mapping.json' },
        { id: 'hit', label: 'hit', file: './dataset/fight/hit.json' },
        { id: 'skill', label: 'skill', file: './dataset/raw/skill.json' },
        { id: 'weapon', label: 'weapon', file: './dataset/raw/weapon.json' },
        { id: 'object', label: 'object', file: './dataset/raw/object.json' },
        { id: 'map', label: 'map', file: './dataset/raw/map.json' }
      ],
      LOCAL_ROOT: 'C:\\Users\\lab\\Desktop\\grimsoul',
      COOKIE_NAME: 'dataset_view_state'
    };

    const Utils = {
      escapeHtml: (v) => String(v).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),
      getByPath: (obj, path) => path.reduce((acc, part) => acc?.[part], obj),
      setByPath: (obj, path, val) => {
        let cur = obj;
        for (let i = 0; i < path.length - 1; i++) {
          if (!cur[path[i]]) cur[path[i]] = {};
          cur = cur[path[i]];
        }
        cur[path[path.length - 1]] = val;
      },
      setCookie: (n, v) => document.cookie = `${n}=${encodeURIComponent(JSON.stringify(v))}; path=/; max-age=31536000; samesite=lax`,
      getCookie: (n) => {
        const m = document.cookie.match(new RegExp('(^| )'+n+'=([^;]+)'));
        try { return m ? JSON.parse(decodeURIComponent(m[2])) : null; } catch { return null; }
      }
    };

    /**
     * MODEL: Data & State Logic
     */
    class DatasetModel {
      constructor() {
        this.state = {
          currentId: 'monster',
          doc: null,
          baseRows: [],
          keys: [],
          meta: {},
          rootLists: {},
          namedTables: {},
          changes: [],
          showDebug: false,
          filters: {},
          listMode: false,
          sortKey: '__none__',
          sortOrder: 'asc',
          isEditMode: false,
          fileHandle: null
        };
      }

      async fetchDataset(id) {
        const d = CONFIG.DATASETS.find(x => x.id === id) || CONFIG.DATASETS[0];
        const res = await fetch(d.file, { cache: 'no-store' });
        const data = await res.json();
        this.processRawData(data, id);
      }

      processRawData(data, id) {
        this.state.currentId = id;
        this.state.doc = data;
        this.state.keys = Array.isArray(data.keys) ? data.keys : [];
        this.state.baseRows = (Array.isArray(data.datas) ? data.datas : []).map((r, i) => ({ ...r, __index: i }));
        this.state.meta = data.filter || {};
        this.state.rootLists = {};
        this.state.namedTables = {};
        this.state.changes = [];
        
        Object.entries(data).forEach(([k, v]) => {
          if (['keys', 'datas', 'filter'].includes(k)) return;
          if (v && v.keys && v.datas) this.state.namedTables[k] = v;
          else if (Array.isArray(v)) this.state.rootLists[k] = v;
        });
      }

      getFilteredAndSortedRows() {
        let rows = this.state.baseRows;
        if (!this.state.showDebug) rows = rows.filter(r => !String(r.ID).startsWith('_'));

        // Filter
        Object.entries(this.state.filters).forEach(([k, val]) => {
          if (!val) return;
          rows = rows.filter(r => {
            const v = r[k];
            return Array.isArray(v) ? v.some(i => String(i).startsWith(val)) : String(v).startsWith(val);
          });
        });

        // Sort
        if (this.state.sortKey !== '__none__') {
          const path = this.state.sortKey.split('.');
          rows = [...rows].sort((a, b) => {
            const va = Utils.getByPath(a, path), vb = Utils.getByPath(b, path);
            const res = va < vb ? -1 : va > vb ? 1 : 0;
            return this.state.sortOrder === 'asc' ? res : -res;
          });
        }
        return rows;
      }
    }

    /**
     * VIEW: DOM Rendering Logic
     */
    class DatasetView {
      constructor() {
        this.els = {
          select: document.getElementById('dataset-select'),
          debug: document.getElementById('show-debug-toggle'),
          status: document.getElementById('status'),
          meta: document.getElementById('meta-filters'),
          headTop: document.getElementById('head-top'),
          headSub: document.getElementById('head-sub'),
          body: document.getElementById('body'),
          toolbar: document.querySelector('.toolbar'),
          flushBtn: document.getElementById('flush-btn'),
          rootLists: document.getElementById('root-lists'),
          namedTables: document.getElementById('named-tables')
        };
      }

      renderFilters(meta, activeFilters, listMode, showDebug) {
        const entries = Object.entries(meta).filter(([k]) => showDebug || !k.startsWith('_'));
        let html = entries.map(([k, options]) => {
          const opts = ['<option value="">（全部）</option>', ...options.filter(o => showDebug || !String(o).startsWith('_')).map(o => 
            `<option value="${Utils.escapeHtml(o)}"${activeFilters[k] === o ? ' selected' : ''}>${Utils.escapeHtml(o)}</option>`
          )].join('');
          return `<label>${k}: <select data-filter="${k}">${opts}</select></label>`;
        }).join(' ');
        
        html += `<label><input type="checkbox" id="table-list-mode" ${listMode ? 'checked' : ''}>（列表）</label>`;
        this.els.meta.innerHTML = html;
      }

      renderTable(rows, keys, state) {
        const visibleKeys = keys.filter(k => state.showDebug || (typeof k === 'string' ? !k.startsWith('_') : !Object.keys(k)[0].startsWith('_')));
        
        // Build Columns (simplified for brevity, reuse your buildColumns logic here)
        const { top, sub, leaf } = this.calculateColumns(visibleKeys, state);
        
        this.els.headTop.innerHTML = top;
        this.els.headSub.innerHTML = sub;
        
        this.els.body.innerHTML = rows.map((r, i) => {
          const cells = leaf.map(col => {
            let val = Utils.getByPath(r, col.path);
            if (Array.isArray(val)) val = state.listMode ? val.join('<br>') : val.join('; ');
            const display = (val === null || val === undefined) ? '<span class="empty">-</span>' : Utils.escapeHtml(val);
            const editable = state.isEditMode ? 'data-editable="1"' : '';
            return `<td ${editable} data-row="${i}" data-path="${col.path.join('.')}">${display}</td>`;
          }).join('');
          return `<tr>${cells}</tr>`;
        }).join('');
      }

      calculateColumns(keys, state) {
        // Logic to build the 2-tier header based on your current buildColumns
        // This is a mapping from keys object to HTML strings for headTop, headSub, and paths for leaf
        let top = '', sub = '', leaf = [];
        keys.forEach(k => {
          if (typeof k === 'string') {
            top += `<th rowspan="2" data-sort="${k}">${k}${state.sortKey===k?(state.sortOrder==='asc'?' ▲':' ▼'):''}</th>`;
            leaf.push({ path: [k] });
          } else {
            const pk = Object.keys(k)[0];
            const children = k[pk];
            top += `<th colspan="${children.length}">${pk}</th>`;
            children.forEach(ck => {
              const cp = `${pk}.${ck}`;
              sub += `<th data-sort="${cp}">${ck}${state.sortKey===cp?(state.sortOrder==='asc'?' ▲':' ▼'):''}</th>`;
              leaf.push({ path: [pk, ck] });
            });
          }
        });
        return { top, sub, leaf };
      }

      updateStatus(text, isEditing = false) {
        this.els.status.textContent = text;
        this.els.toolbar.classList.toggle('editing', isEditing);
        this.els.flushBtn.disabled = !isEditing;
      }
    }

    /**
     * CONTROLLER: Coordination
     */
    class AppController {
      constructor(model, view) {
        this.model = model;
        this.view = view;
        this.init();
      }

      async init() {
        this.view.els.select.innerHTML = CONFIG.DATASETS.map(d => `<option value="${d.id}">${d.label}</option>`).join('');
        
        const saved = Utils.getCookie(CONFIG.COOKIE_NAME) || {};
        this.model.state.currentId = saved.dataset || 'monster';
        this.model.state.showDebug = !!saved.showDebug;
        this.model.state.filters = saved.filters || {};
        this.model.state.listMode = !!saved.listMode;

        this.view.els.select.value = this.model.state.currentId;
        this.view.els.debug.checked = this.model.state.showDebug;

        this.bindEvents();
        await this.loadCurrent();
      }

      bindEvents() {
        this.view.els.select.addEventListener('change', e => {
          this.model.state.filters = {};
          this.loadCurrent(e.target.value);
        });

        this.view.els.debug.addEventListener('change', e => {
          this.model.state.showDebug = e.target.checked;
          this.refresh();
        });

        this.view.els.meta.addEventListener('change', e => {
          if (e.target.dataset.filter) {
            this.model.state.filters[e.target.dataset.filter] = e.target.value;
            this.refresh();
          }
          if (e.target.id === 'table-list-mode') {
            this.model.state.listMode = e.target.checked;
            this.refresh();
          }
        });

        this.view.els.headTop.addEventListener('click', e => this.handleSort(e));
        this.view.els.headSub.addEventListener('click', e => this.handleSort(e));

        document.getElementById('open-file-btn').addEventListener('click', () => this.handleFileOpen());
        document.getElementById('flush-btn').addEventListener('click', () => this.handleFlush());
        document.getElementById('copy-path-btn').addEventListener('click', () => {
          const d = CONFIG.DATASETS.find(x => x.id === this.model.state.currentId);
          const abs = `${CONFIG.LOCAL_ROOT}\\docs\\${d.file.replace('./', '').replace(/\//g, '\\')}`;
          navigator.clipboard.writeText(abs).then(() => alert('已複製路徑'));
        });
      }

      async loadCurrent(id = this.model.state.currentId) {
        this.view.updateStatus('載入中...');
        try {
          await this.model.fetchDataset(id);
          this.refresh();
        } catch (e) {
          this.view.updateStatus('載入失敗: ' + e.message);
        }
      }

      handleSort(e) {
        const key = e.target.dataset.sort;
        if (!key) return;
        if (this.model.state.sortKey === key) {
          this.model.state.sortOrder = this.model.state.sortOrder === 'asc' ? 'desc' : 'asc';
        } else {
          this.model.state.sortKey = key;
          this.model.state.sortOrder = 'asc';
        }
        this.refresh();
      }

      refresh() {
        const rows = this.model.getFilteredAndSortedRows();
        this.view.renderFilters(this.model.state.meta, this.model.state.filters, this.model.state.listMode, this.model.state.showDebug);
        this.view.renderTable(rows, this.model.state.keys, this.model.state.isEditMode ? { ...this.model.state, isEditMode: true } : this.model.state);
        this.view.updateStatus(`${this.model.state.currentId}: ${rows.length} 筆`, this.model.state.isEditMode);
        
        Utils.setCookie(CONFIG.COOKIE_NAME, {
          dataset: this.model.state.currentId,
          showDebug: this.model.state.showDebug,
          filters: this.model.state.filters,
          listMode: this.model.state.listMode
        });
      };

      async handleFileOpen() {
        const [handle] = await window.showOpenFilePicker();
        const file = await handle.getFile();
        const data = JSON.parse(await file.text());
        this.model.processRawData(data, file.name);
        this.model.state.isEditMode = true;
        this.model.state.fileHandle = handle;
        this.refresh();
      }

      async handleFlush() {
        const writable = await this.model.state.fileHandle.createWritable();
        const out = { ...this.model.state.doc, datas: this.model.state.baseRows.map(({__index, ...r}) => r) };
        await writable.write(JSON.stringify(out, null, 2));
        await writable.close();
        this.model.state.isEditMode = false;
        this.refresh();
      }
    }

    // Start the App
    new AppController(new DatasetModel(), new DatasetView());
  </script>
</body>
</html>
