<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Dataset Viewer</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --panel: #fff;
      --text: #101216;
      --muted: #69707d;
      --line: #dcdfe4;
      --head: #12161d;
      --shadow: rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg,#fff 0%,#f9fafb 20%,var(--bg) 100%);
    }
    .page { max-width: 1700px; margin: 0 auto; padding: 26px 18px 44px; }
    .top {
      display: flex; align-items: end; justify-content: space-between; gap: 16px; margin-bottom: 14px;
    }
    .kicker { font-size: 11px; letter-spacing: .13em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
    h1 { margin: 6px 0 0; font-size: clamp(30px, 5vw, 54px); line-height: 1; letter-spacing: -.03em; }
    .intro { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
    .home { text-decoration: none; color: var(--text); border: 1px solid var(--line); border-radius: 999px; padding: 9px 14px; background: #fff; }
    .home:hover { border-color: #b8bec8; }
    .toolbar {
      border: 1px solid var(--line); border-radius: 16px; background: var(--panel); box-shadow: 0 12px 32px var(--shadow);
      padding: 12px; display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap;
    }
    .toolbar-right {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .toolbar.editing {
      border-color: #1f7a45;
      box-shadow: 0 12px 32px rgba(31,122,69,.16);
      background: #f4fff8;
    }
    label { font-size: 13px; color: var(--muted); }
    select {
      min-width: 260px; padding: 8px 10px; border-radius: 10px; border: 1px solid var(--line); background: #fff; color: var(--text);
    }
    .status { color: var(--muted); font-size: 13px; }
    .btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 10px;
      background: #fff;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }
    .btn:hover { border-color: #b8bec8; }
    .btn.primary {
      border-color: #1f7a45;
      background: #1f7a45;
      color: #fff;
    }
    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    .table-wrap {
      border: 1px solid var(--line); border-radius: 16px; background: var(--panel); box-shadow: 0 12px 32px var(--shadow);
      overflow: auto;
    }
    .root-lists-wrap {
      margin-bottom: 12px;
    }
    .root-list-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      background: #fff;
    }
    .root-list-head {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .root-list-table-wrap { overflow: auto; }
    .root-list-table th { position: static; background: #f5f6f8; color: #2b3240; }
    .root-list-table {
      width: 100%;
      min-width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      border: 1px solid var(--line);
    }
    .root-list-table td, .root-list-table th {
      border: 1px solid var(--line);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    table { width: max-content; min-width: 100%; border-collapse: collapse; }
    th, td {
      padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; font-size: 12px; line-height: 1.45; white-space: nowrap;
    }
    th { position: sticky; top: 0; z-index: 2; background: var(--head); color: #fff; font-size: 11px; letter-spacing: .03em; }
    tbody tr:nth-child(even) td { background: #fcfcfd; }
    .json { white-space: pre-wrap; line-height: 1.35; }
    .empty { color: #9aa2ad; }
    code { font-family: Consolas, "Courier New", monospace; }
  </style>
</head>
<body>
  <main class="page">
    <div class="top">
      <div>
        <div class="kicker">Dataset</div>
        <h1>Dataset Viewer</h1>
        <p class="intro">單一頁面瀏覽所有可用 dataset。</p>
      </div>
      <a class="home" href="./index.html">回首頁</a>
    </div>

    <div class="toolbar">
      <label for="dataset-select">資料集：</label>
      <select id="dataset-select"></select>
      <label><input id="show-debug-toggle" type="checkbox" /> 顯示 DEBUG</label>
      <span id="meta-filters"></span>
      <div class="toolbar-right">
        <button id="open-file-btn" class="btn" type="button">開啟檔案（編輯）</button>
        <button id="copy-path-btn" class="btn" type="button">複製路徑</button>
      </div>
      <button id="flush-btn" class="btn primary" type="button" disabled>寫入 Flush</button>
      <span id="status" class="status">載入中...</span>
    </div>

    <div id="root-lists" class="root-lists-wrap" style="display:none;"></div>
    <div id="named-tables" class="root-lists-wrap" style="display:none;"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr id="head-top"></tr>
          <tr id="head-sub"></tr>
        </thead>
        <tbody id="body"><tr><td class="empty">載入中...</td></tr></tbody>
      </table>
    </div>
  </main>

  <script>
    const DATASETS = [
      { id: 'armor-items', label: 'armor items', file: '../dataset/raw/armor-items.json' },
      { id: 'armor-set-effects', label: 'armor sets', file: '../dataset/raw/armor-set-effects.json' },
      { id: 'armor-sets', label: 'armor sheet', file: '../dataset/raw/armor-sets.json' },
      { id: 'monster', label: 'monster', file: '../dataset/raw/monster.json' },
      { id: 'hit', label: 'hit', file: '../dataset/fight/hit.json' },
      { id: 'skill', label: 'skill', file: '../dataset/raw/skill.json' },
      { id: 'weapon', label: 'weapon', file: '../dataset/raw/weapon.json' }
    ];
    const LOCAL_PROJECT_ROOT = 'C:\\Users\\lab\\Desktop\\grimsoul';

    const selectEl = document.getElementById('dataset-select');
    const showDebugToggleEl = document.getElementById('show-debug-toggle');
    const toolbarEl = document.querySelector('.toolbar');
    const statusEl = document.getElementById('status');
    const metaFiltersEl = document.getElementById('meta-filters');
    const headTopEl = document.getElementById('head-top');
    const headSubEl = document.getElementById('head-sub');
    const bodyEl = document.getElementById('body');
    const openFileBtn = document.getElementById('open-file-btn');
    const copyPathBtn = document.getElementById('copy-path-btn');
    const flushBtn = document.getElementById('flush-btn');
    const rootListsEl = document.getElementById('root-lists');
    const namedTablesEl = document.getElementById('named-tables');
    const VIEW_STATE_COOKIE = 'dataset_view_state';
    let currentRows = [];
    let currentBaseRows = [];
    let currentKeyOrder = [];
    let currentDataset = { keys: [], datas: [] };
    let currentDoc = null;
    let currentDatasetId = 'monster';
    let changes = [];
    let activeSortKey = '__none__';
    let activeSortOrder = 'asc';
    let currentMeta = {};
    let currentRootLists = {};
    let currentNamedTables = {};
    let namedTableStates = {};
    let activeMetaFilters = {};
    let activeTableListMode = false;
    let initialQueryFilters = {};
    let editFileHandle = null;
    let isEditMode = false;
    let isDirty = false;
    let showDebug = false;

    function setCookie(name, value, maxAgeSec = 60 * 60 * 24 * 365) {
      document.cookie = `${name}=${value}; path=/; max-age=${maxAgeSec}; samesite=lax`;
    }

    function getCookie(name) {
      const prefix = `${name}=`;
      const parts = document.cookie.split(';').map((x) => x.trim());
      const found = parts.find((x) => x.startsWith(prefix));
      return found ? found.slice(prefix.length) : '';
    }

    function saveViewState() {
      const state = {
        dataset: currentDatasetId,
        showDebug,
        filters: activeMetaFilters,
        listMode: activeTableListMode,
      };
      setCookie(VIEW_STATE_COOKIE, encodeURIComponent(JSON.stringify(state)));
    }

    function loadViewState() {
      try {
        const raw = getCookie(VIEW_STATE_COOKIE);
        if (!raw) return null;
        return JSON.parse(decodeURIComponent(raw));
      } catch {
        return null;
      }
    }

    function setModePreview() {
      isEditMode = false;
      editFileHandle = null;
      isDirty = false;
      flushBtn.disabled = true;
      flushBtn.style.display = 'none';
      toolbarEl.classList.remove('editing');
    }

    function setModeEditing(handle) {
      isEditMode = true;
      editFileHandle = handle;
      isDirty = false;
      flushBtn.disabled = false;
      flushBtn.style.display = '';
      toolbarEl.classList.add('editing');
    }

    function pendingChangeCount() {
      const unique = new Set();
      for (const c of changes) {
        unique.add(`${c.index}::${c.path}`);
      }
      return unique.size;
    }

    function refreshStatusLoaded(labelOverride = null) {
      const d = DATASETS.find(x => x.id === currentDatasetId) || DATASETS[0];
      const label = labelOverride || d.label;
      const pending = pendingChangeCount();
      if (isEditMode) {
        statusEl.textContent = `${label}：${currentRows.length} 筆（未寫入變更 ${pending} 項）`;
      } else {
        statusEl.textContent = `${label}：${currentRows.length} 筆（預覽）`;
      }
    }

    function escapeHtml(v) {
      return String(v)
        .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
        .replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }

    function valToHtml(v, flattenList = false) {
      if (v === null || v === undefined || v === '') return '<span class="empty">-</span>';
      if (Array.isArray(v) && flattenList) return escapeHtml(v.join('; '));
      if (typeof v === 'object') return `<span class="json">${escapeHtml(JSON.stringify(v, null, 2))}</span>`;
      return escapeHtml(v);
    }

    function isUnderscoreHidden(value) {
      return typeof value === 'string' && value.startsWith('_');
    }

    function visibleValue(raw) {
      if (showDebug) return raw;
      if (isUnderscoreHidden(raw)) return '';
      if (Array.isArray(raw)) {
        return raw.filter((x) => !isUnderscoreHidden(x));
      }
      return raw;
    }

    function isRowHidden(row) {
      if (showDebug) return false;
      return isUnderscoreHidden(row?.ID);
    }

    function normalizeDataset(data) {
      if (!data || typeof data !== 'object' || Array.isArray(data)) {
        throw new Error('Dataset format must be a JSON object');
      }
      const meta = (data.filter && typeof data.filter === 'object' && !Array.isArray(data.filter))
        ? data.filter
        : {};
      const rootLists = {};
      const namedTables = {};
      for (const [k, v] of Object.entries(data)) {
        if (k === 'keys' || k === 'datas' || k === 'filter') continue;
        if (v && typeof v === 'object' && !Array.isArray(v) && Array.isArray(v.keys) && Array.isArray(v.datas)) {
          namedTables[k] = {
            keys: v.keys,
            datas: v.datas,
            filter: (v.filter && typeof v.filter === 'object' && !Array.isArray(v.filter)) ? v.filter : {}
          };
          continue;
        }
        if (Array.isArray(v)) rootLists[k] = v;
      }
      const rows = Array.isArray(data.datas) ? data.datas : [];
      const keys = Array.isArray(data.keys) ? data.keys : [];
      return { rows, keys, meta, rootLists, namedTables };
    }

    function renderRootLists() {
      function autoCols(values) {
        if (!values.length) return 1;
        const lengths = values.map((x) => String(x ?? '').length);
        const avg = lengths.reduce((a, b) => a + b, 0) / lengths.length;
        let cols = 4;
        if (avg <= 4) cols = 8;
        else if (avg <= 8) cols = 6;
        else if (avg <= 12) cols = 5;
        else if (avg <= 20) cols = 4;
        else cols = 3;
        cols = Math.min(cols, values.length, 12);
        cols = Math.max(cols, 1);
        return cols;
      }

      const entries = Object.entries(currentRootLists).filter(([k, v]) => {
        if (!Array.isArray(v)) return false;
        if (!showDebug && String(k).startsWith('_')) return false;
        return true;
      });
      if (!entries.length) {
        rootListsEl.style.display = 'none';
        rootListsEl.innerHTML = '';
        return;
      }
      rootListsEl.style.display = '';
      rootListsEl.innerHTML = entries.map(([k, arr]) => {
        const values = showDebug ? arr : arr.filter((x) => !isUnderscoreHidden(x));
        const cols = autoCols(values);
        const rows = [];
        for (let i = 0; i < values.length; i += cols) rows.push(values.slice(i, i + cols));
        const body = rows.map((row) => {
          const cells = [];
          for (let i = 0; i < cols; i += 1) {
            const v = row[i];
            cells.push(`<td>${v === undefined ? '<span class="empty">-</span>' : escapeHtml(String(v))}</td>`);
          }
          return `<tr>${cells.join('')}</tr>`;
        }).join('');
        return `
          <div class="root-list-card">
            <div class="root-list-head">
              <strong>${escapeHtml(k)}</strong>
              <span>共 ${values.length} 項</span>
              <span>表格：${rows.length} x ${cols}</span>
            </div>
            <div class="root-list-table-wrap">
              <table class="root-list-table"><tbody>${body || '<tr><td class="empty">-</td></tr>'}</tbody></table>
            </div>
          </div>`;
      }).join('');
    }

    function collectKeys(explicitKeys) {
      if (!Array.isArray(explicitKeys)) return [];
      if (showDebug) return explicitKeys;
      return explicitKeys.filter((k) => {
        if (typeof k === 'string') return !k.startsWith('_');
        if (k && typeof k === 'object') {
          const ks = Object.keys(k);
          if (ks.length === 1) return !String(ks[0]).startsWith('_');
        }
        return true;
      });
    }

    // key spec supports:
    // "Health"
    // { "Fracture": ["Armor", "Weapon"] }
    // { key: "Fracture", children: ["Armor","Weapon"] }
    function buildColumns(keys) {
      const top = [];
      const sub = [];
      const leaf = [];
      for (const item of keys) {
        if (typeof item === 'string') {
          top.push({ label: item, path: [item], rowspan: 2, colspan: 1, sortable: true });
          leaf.push({ label: item, path: [item], sortable: true });
          continue;
        }
        if (item && typeof item === 'object') {
          let parent = null;
          let children = null;
          const ks = Object.keys(item);
          if (ks.length === 1 && Array.isArray(item[ks[0]])) {
            parent = ks[0];
            children = item[parent];
          }
          if (parent && children && children.length) {
            top.push({ label: parent, path: [parent], rowspan: 1, colspan: children.length, sortable: false });
            for (const ch of children) {
              const cLabel = String(ch);
              const cPath = [parent, cLabel];
              leaf.push({ label: cLabel, path: cPath, sortable: true });
              sub.push({ label: cLabel, path: cPath, sortable: true });
            }
            continue;
          }
        }
      }
      return { top, sub, leaf };
    }

    function getByPath(obj, path) {
      let cur = obj;
      for (const p of path) {
        if (cur == null || typeof cur !== 'object' || !(p in cur)) return undefined;
        cur = cur[p];
      }
      return cur;
    }

    function setByPath(obj, path, value) {
      if (!path.length) return;
      let cur = obj;
      for (let i = 0; i < path.length - 1; i += 1) {
        const p = path[i];
        if (cur[p] == null || typeof cur[p] !== 'object') cur[p] = {};
        cur = cur[p];
      }
      cur[path[path.length - 1]] = value;
    }

    function deleteByPath(obj, path) {
      if (!path.length) return;
      let cur = obj;
      for (let i = 0; i < path.length - 1; i += 1) {
        const p = path[i];
        if (cur[p] == null || typeof cur[p] !== 'object') return;
        cur = cur[p];
      }
      delete cur[path[path.length - 1]];
    }

    function downloadText(filename, content, type = 'application/json;charset=utf-8') {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function normalizeSortValue(v) {
      // rank: 0 empty, 1 number, 2 text
      if (v === null || v === undefined) return { rank: 0, value: '' };
      if (typeof v === 'string' && v.trim() === '') return { rank: 0, value: '' };
      if (Array.isArray(v) && v.length === 0) return { rank: 0, value: '' };

      if (typeof v === 'number') return { rank: 1, value: v };
      if (typeof v === 'boolean') return { rank: 1, value: v ? 1 : 0 };

      const s = typeof v === 'object' ? JSON.stringify(v) : String(v);
      const n = Number(s);
      if (!Number.isNaN(n) && s.trim() !== '') return { rank: 1, value: n };
      return { rank: 2, value: s.toLowerCase() };
    }

    function sortRows(rows, key, order) {
      if (!key || key === '__none__') return [...rows];
      const sign = order === 'desc' ? -1 : 1;
      const path = key.split('.');
      return [...rows].sort((a, b) => {
        const va = normalizeSortValue(getByPath(a, path));
        const vb = normalizeSortValue(getByPath(b, path));

        if (va.rank !== vb.rank) return (va.rank - vb.rank) * sign;
        if (va.value < vb.value) return -1 * sign;
        if (va.value > vb.value) return 1 * sign;

        // Stable tie-breaker: preserve original row order.
        const ai = Number.isFinite(a.__index) ? a.__index : 0;
        const bi = Number.isFinite(b.__index) ? b.__index : 0;
        return ai - bi;
      });
    }

    function render(rows) {
      const keys = collectKeys(currentKeyOrder);
      const columns = buildColumns(keys);
      const key = activeSortKey;
      const order = activeSortOrder;
      const visibleRows = rows.filter((r) => !isRowHidden(r));
      const sortedRows = sortRows(visibleRows, key, order);
      currentRows = sortedRows;
      if (!rows.length || !columns.leaf.length) {
        headTopEl.innerHTML = '';
        headSubEl.innerHTML = '';
        bodyEl.innerHTML = '<tr><td class="empty">無資料可顯示</td></tr>';
        return;
      }
      headTopEl.innerHTML = columns.top.map(c => {
        const k = c.path.join('.');
        const marker = (c.sortable && k === key) ? (order === 'asc' ? ' ▲' : ' ▼') : '';
        const attrs = c.sortable ? `data-sort-key="${escapeHtml(k)}"` : '';
        const span = `rowspan="${c.rowspan}" colspan="${c.colspan}"`;
        return `<th ${span} ${attrs}>${escapeHtml(c.label)}${marker}</th>`;
      }).join('');
      headSubEl.innerHTML = columns.sub.map(c => {
        const k = c.path.join('.');
        const marker = (k === key) ? (order === 'asc' ? ' ▲' : ' ▼') : '';
        return `<th data-sort-key="${escapeHtml(k)}">${escapeHtml(c.label)}${marker}</th>`;
      }).join('');
      bodyEl.innerHTML = currentRows.map((r, i) => {
        const idx = r.__index ?? i;
        const cols = columns.leaf.map((c) => {
          const raw = getByPath(r, c.path);
          const shown = visibleValue(raw);
          const isArray = Array.isArray(shown);
          const flattenList = !activeTableListMode;
          const editable = isEditMode && shown !== '-' && (shown === null || typeof shown !== 'object' || isArray);
          const val = shown === null || shown === undefined
            ? ''
            : (isArray ? shown.join('; ') : String(shown));
          const rawType = isArray ? 'array' : (raw === null ? 'null' : typeof raw);
          return `<td data-row="${i}" data-idx="${idx}" data-path="${escapeHtml(c.path.join('.'))}" data-editable="${editable ? '1' : '0'}" data-raw-type="${rawType}" data-raw="${escapeHtml(val)}">${valToHtml(shown, flattenList)}</td>`;
        }).join('');
        return `<tr>${cols}</tr>`;
      }).join('');

      bodyEl.querySelectorAll('td[data-editable="1"]').forEach((td) => {
        td.addEventListener('dblclick', () => startInlineEdit(td));
      });
      const bindSort = (root) => {
        root.querySelectorAll('th[data-sort-key]').forEach((th) => {
          th.addEventListener('click', () => {
            const k = th.dataset.sortKey;
            if (activeSortKey === k) {
              activeSortOrder = activeSortOrder === 'asc' ? 'desc' : 'asc';
            } else {
              activeSortKey = k;
              activeSortOrder = 'asc';
            }
            render(currentRows);
          });
        });
      };
      bindSort(headTopEl);
      bindSort(headSubEl);
    }

    function applyMetaFilters(rows) {
      let out = rows;
      for (const [key, value] of Object.entries(activeMetaFilters)) {
        if (!value) continue;
        const needle = String(value).toLowerCase();
        out = out.filter((r) => {
          const v = visibleValue(r[key]);
          if (Array.isArray(v)) {
            return v.some((item) => String(item ?? '').toLowerCase().startsWith(needle));
          }
          return String(v ?? '').toLowerCase().startsWith(needle);
        });
      }
      return out;
    }

    function applyMetaFiltersGeneric(rows, filters) {
      let out = rows;
      for (const [key, value] of Object.entries(filters || {})) {
        if (!value) continue;
        const needle = String(value).toLowerCase();
        out = out.filter((r) => {
          const v = visibleValue(r[key]);
          if (Array.isArray(v)) {
            return v.some((item) => String(item ?? '').toLowerCase().startsWith(needle));
          }
          return String(v ?? '').toLowerCase().startsWith(needle);
        });
      }
      return out;
    }

    function renderNamedTables() {
      const entries = Object.entries(currentNamedTables || {}).filter(([k, v]) => {
        if (!v || typeof v !== 'object') return false;
        if (!Array.isArray(v.keys) || !Array.isArray(v.datas)) return false;
        if (!showDebug && String(k).startsWith('_')) return false;
        return true;
      });
      if (!entries.length) {
        namedTablesEl.style.display = 'none';
        namedTablesEl.innerHTML = '';
        return;
      }

      namedTablesEl.style.display = '';
      namedTablesEl.innerHTML = entries.map(([name, table]) => {
        const state = namedTableStates[name] || (namedTableStates[name] = {
          sortKey: '__none__',
          sortOrder: 'asc',
          filters: {},
          listMode: false
        });
        const meta = (table.filter && typeof table.filter === 'object') ? table.filter : {};
        const baseRows = table.datas.map((r, i) => ({ ...r, __index: i }));
        const filteredRows = applyMetaFiltersGeneric(baseRows, state.filters);
        const keys = collectKeys(table.keys);
        const columns = buildColumns(keys);
        const visibleRows = filteredRows.filter((r) => !isRowHidden(r));
        const sortedRows = sortRows(visibleRows, state.sortKey, state.sortOrder);

        const filterEntries = Object.entries(meta).filter(([k, v]) => {
          if (!Array.isArray(v)) return false;
          if (!showDebug && String(k).startsWith('_')) return false;
          return true;
        });
        const filtersHtml = filterEntries.map(([k, arr]) => {
          const cleanArr = showDebug ? arr : arr.filter((x) => !isUnderscoreHidden(x));
          const options = ['<option value="">（全部）</option>']
            .concat(cleanArr.map((x) => {
              const v = String(x);
              const selected = state.filters[k] === v ? ' selected' : '';
              return `<option value="${escapeHtml(v)}"${selected}>${escapeHtml(v)}</option>`;
            }))
            .join('');
          return `<label>${escapeHtml(k)}：<select data-nt-meta-key="${escapeHtml(k)}">${options}</select></label>`;
        }).join('');

        const headTop = columns.top.map(c => {
          const k = c.path.join('.');
          const marker = (c.sortable && k === state.sortKey) ? (state.sortOrder === 'asc' ? ' ▲' : ' ▼') : '';
          const attrs = c.sortable ? `data-nt-sort-key="${escapeHtml(k)}"` : '';
          const span = `rowspan="${c.rowspan}" colspan="${c.colspan}"`;
          return `<th ${span} ${attrs}>${escapeHtml(c.label)}${marker}</th>`;
        }).join('');
        const headSub = columns.sub.map(c => {
          const k = c.path.join('.');
          const marker = (k === state.sortKey) ? (state.sortOrder === 'asc' ? ' ▲' : ' ▼') : '';
          return `<th data-nt-sort-key="${escapeHtml(k)}">${escapeHtml(c.label)}${marker}</th>`;
        }).join('');
        const body = sortedRows.map((r) => {
          const cols = columns.leaf.map((c) => {
            const raw = getByPath(r, c.path);
            const shown = visibleValue(raw);
            const isArray = Array.isArray(shown);
            const flattenList = !state.listMode;
            return `<td>${valToHtml(shown, flattenList && isArray)}</td>`;
          }).join('');
          return `<tr>${cols}</tr>`;
        }).join('') || '<tr><td class="empty">無資料可顯示</td></tr>';

        return `
          <div class="root-list-card" data-nt-card="${escapeHtml(name)}">
            <div class="root-list-head">
              <strong>${escapeHtml(name)}</strong>
              <span>共 ${sortedRows.length} 筆</span>
              <label><input type="checkbox" data-nt-list-mode ${state.listMode ? 'checked' : ''} />（列表）</label>
            </div>
            ${filtersHtml
              ? `<div class="toolbar" style="margin-bottom:8px; box-shadow:none; border-radius:10px;">${filtersHtml}</div>`
              : ''}
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>${headTop}</tr>
                  <tr>${headSub}</tr>
                </thead>
                <tbody>${body}</tbody>
              </table>
            </div>
          </div>
        `;
      }).join('');

      namedTablesEl.querySelectorAll('[data-nt-card]').forEach((card) => {
        const name = card.getAttribute('data-nt-card');
        const state = namedTableStates[name];
        card.querySelectorAll('select[data-nt-meta-key]').forEach((sel) => {
          sel.addEventListener('change', () => {
            const k = sel.dataset.ntMetaKey;
            state.filters[k] = sel.value || '';
            renderNamedTables();
          });
        });
        card.querySelectorAll('input[type="checkbox"][data-nt-list-mode]').forEach((cb) => {
          cb.addEventListener('change', () => {
            state.listMode = cb.checked;
            renderNamedTables();
          });
        });
        card.querySelectorAll('th[data-nt-sort-key]').forEach((th) => {
          th.addEventListener('click', () => {
            const k = th.dataset.ntSortKey;
            if (state.sortKey === k) {
              state.sortOrder = state.sortOrder === 'asc' ? 'desc' : 'asc';
            } else {
              state.sortKey = k;
              state.sortOrder = 'asc';
            }
            renderNamedTables();
          });
        });
      });
    }

    function renderMetaFilters() {
      const entries = Object.entries(currentMeta).filter(([k, v]) => {
        if (!Array.isArray(v)) return false;
        if (!showDebug && String(k).startsWith('_')) return false;
        return true;
      });
      if (!entries.length) {
        const listChecked = activeTableListMode ? ' checked' : '';
        metaFiltersEl.innerHTML = `<label><input type="checkbox" id="table-list-mode"${listChecked} />（列表）</label>`;
        const listCbOnly = document.getElementById('table-list-mode');
        if (listCbOnly) {
          listCbOnly.addEventListener('change', () => {
            activeTableListMode = listCbOnly.checked;
            saveViewState();
            render(currentRows);
          });
        }
        return;
      }
      const controls = entries.map(([k, arr]) => {
        const cleanArr = showDebug ? arr : arr.filter((x) => !isUnderscoreHidden(x));
        const options = ['<option value="">（全部）</option>']
          .concat(cleanArr.map((x) => {
            const v = String(x);
            const selected = activeMetaFilters[k] === v ? ' selected' : '';
            return `<option value="${escapeHtml(v)}"${selected}>${escapeHtml(v)}</option>`;
          }))
          .join('');
        return `<label>${escapeHtml(k)}：<select data-meta-key="${escapeHtml(k)}">${options}</select></label>`;
      }).join('');
      const listChecked = activeTableListMode ? ' checked' : '';
      metaFiltersEl.innerHTML = `${controls} <label><input type="checkbox" id="table-list-mode"${listChecked} />（列表）</label>`;
      metaFiltersEl.querySelectorAll('select[data-meta-key]').forEach((sel) => {
        sel.addEventListener('change', () => {
          const k = sel.dataset.metaKey;
          activeMetaFilters[k] = sel.value || '';
          const url = new URL(location.href);
          if (activeMetaFilters[k]) url.searchParams.set(k, activeMetaFilters[k]);
          else url.searchParams.delete(k);
          history.replaceState({}, '', url);
          saveViewState();
          currentRows = applyMetaFilters(currentBaseRows);
          render(currentRows);
        });
      });
      const listCb = document.getElementById('table-list-mode');
      if (listCb) {
        listCb.addEventListener('change', () => {
          activeTableListMode = listCb.checked;
          saveViewState();
          render(currentRows);
        });
      }
    }

    function startInlineEdit(td) {
      if (!isEditMode) return;
      if (td.dataset.editing === '1') return;
      td.dataset.editing = '1';
      const oldValue = td.dataset.raw ?? '';
      const rawType = td.dataset.rawType ?? 'string';
      const rowIndex = Number(td.dataset.row);
      const stableIdx = Number(td.dataset.idx);
      const path = (td.dataset.path || '').split('.').filter(Boolean);

      const input = document.createElement('input');
      input.type = 'text';
      input.value = oldValue;
      input.style.width = '100%';
      input.style.font = 'inherit';
      input.style.border = '1px solid #9aa5b5';
      input.style.borderRadius = '6px';
      input.style.padding = '4px 6px';
      input.style.background = '#fff';
      input.style.color = '#101216';

      td.innerHTML = '';
      td.appendChild(input);
      input.focus();
      input.select();

      let finished = false;
      const commit = () => {
        if (finished) return;
        finished = true;
        const newValue = input.value;
        const target = currentRows[rowIndex];
        if (target) {
          const before = getByPath(target, path);
          if (rawType === 'array') {
            if (newValue.trim() === '') {
              deleteByPath(target, path);
            } else {
              const arr = newValue
                .split(/[;；]+/)
                .map((x) => x.trim())
                .filter(Boolean);
              if (arr.length === 0) deleteByPath(target, path);
              else setByPath(target, path, arr);
            }
          } else {
            if (newValue === '') deleteByPath(target, path);
            else setByPath(target, path, newValue);
          }
          changes.push({
            index: Number.isFinite(stableIdx) ? stableIdx : target.__index ?? rowIndex,
            path: path.join('.'),
            before: before ?? null,
            after: newValue === '' ? null : newValue
          });
          isDirty = true;
        }
        td.dataset.editing = '0';
        render(currentRows);
        refreshStatusLoaded();
      };
      const cancel = () => {
        if (finished) return;
        finished = true;
        td.dataset.editing = '0';
        render(currentRows);
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          commit();
        } else if (e.key === 'Escape') {
          e.preventDefault();
          cancel();
        }
      });
      input.addEventListener('blur', () => cancel());
    }

    async function loadOne(id) {
      const prevDatasetId = currentDatasetId;
      const d = DATASETS.find(x => x.id === id) || DATASETS[0];
      currentDatasetId = d.id;
      const isDatasetSwitch = prevDatasetId !== d.id;
      statusEl.textContent = `載入 ${d.label}...`;
      try {
        const res = await fetch(d.file, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        currentDoc = data;
        const normalized = normalizeDataset(data);
        currentKeyOrder = normalized.keys;
        const rawRows = normalized.rows.map((r, i) => ({ ...r, __index: i }));
        currentMeta = normalized.meta || {};
        currentRootLists = normalized.rootLists || {};
        currentNamedTables = normalized.namedTables || {};
        namedTableStates = {};
        if (isDatasetSwitch) {
          activeMetaFilters = {};
          activeTableListMode = false;
        }
        renderMetaFilters();
        renderRootLists();
        renderNamedTables();
        currentBaseRows = rawRows;
        currentRows = applyMetaFilters(currentBaseRows);
        currentDataset = {
          keys: [...currentKeyOrder],
          datas: rawRows.map(({ __index, ...rest }) => rest)
        };
        changes = [];
        isDirty = false;
        render(currentRows);
        refreshStatusLoaded(d.label);
        saveViewState();
      } catch (e) {
        currentRootLists = {};
        currentNamedTables = {};
        rootListsEl.style.display = 'none';
        rootListsEl.innerHTML = '';
        namedTablesEl.style.display = 'none';
        namedTablesEl.innerHTML = '';
        headTopEl.innerHTML = '';
        headSubEl.innerHTML = '';
        bodyEl.innerHTML = `<tr><td class="empty">載入失敗：${escapeHtml(e.message)}</td></tr>`;
        statusEl.textContent = `${d.label} 載入失敗`;
      }
    }

    async function openFileForEdit() {
      if (!window.showOpenFilePicker) {
        alert('此瀏覽器不支援 File System Access API。請使用新版 Chrome/Edge。');
        return;
      }
      try {
        const [handle] = await window.showOpenFilePicker({
          multiple: false,
          types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
        });
        const file = await handle.getFile();
        const text = await file.text();
        const data = JSON.parse(text);
        currentDoc = data;
        const normalized = normalizeDataset(data);
        currentKeyOrder = normalized.keys;
        currentBaseRows = normalized.rows.map((r, i) => ({ ...r, __index: i }));
        currentMeta = normalized.meta || {};
        currentRootLists = normalized.rootLists || {};
        currentNamedTables = normalized.namedTables || {};
        namedTableStates = {};
        renderMetaFilters();
        renderRootLists();
        renderNamedTables();
        currentRows = applyMetaFilters(currentBaseRows);
        currentDataset = {
          keys: [...currentKeyOrder],
          datas: currentBaseRows.map(({ __index, ...rest }) => rest)
        };
        changes = [];
        setModeEditing(handle);
        render(currentRows);
        statusEl.textContent = `${file.name}：${currentRows.length} 筆（未寫入變更 0 項）`;
      } catch (e) {
        if (e && e.name === 'AbortError') return;
        statusEl.textContent = `開檔失敗：${e.message}`;
      }
    }

    async function copyCurrentDatasetPath() {
      const d = DATASETS.find(x => x.id === currentDatasetId) || DATASETS[0];
      const rel = d.file
        .replace(/^\.\.\//, '')
        .replace(/^\.\//, 'docs/')
        .replaceAll('/', '\\');
      const abs = `${LOCAL_PROJECT_ROOT}\\${rel}`;
      try {
        await navigator.clipboard.writeText(abs);
        statusEl.textContent = `已複製路徑：${abs}`;
      } catch (e) {
        statusEl.textContent = `複製失敗：${e.message}`;
      }
    }

    async function flushToFile() {
      if (!isEditMode || !editFileHandle) return;
      try {
        const datas = currentBaseRows
          .slice()
          .sort((a, b) => (a.__index ?? 0) - (b.__index ?? 0))
          .map(({ __index, ...rest }) => rest);
        const out = {
          ...(currentDoc && typeof currentDoc === 'object' ? currentDoc : {}),
          keys: currentKeyOrder,
          datas,
        };
        const writable = await editFileHandle.createWritable();
        await writable.write(JSON.stringify(out, null, 2));
        await writable.close();
        isDirty = false;
        changes = [];
        currentDoc = out;
        setModePreview();
        statusEl.textContent = `已寫入：${currentDatasetId}（預覽）`;
      } catch (e) {
        statusEl.textContent = `寫入失敗：${e.message}`;
      }
    }

    function init() {
      const params = new URLSearchParams(location.search);
      const q = params.get('d') || 'monster';
      const cookieState = loadViewState();
      initialQueryFilters = {};
      for (const [k, v] of params.entries()) {
        if (k !== 'd' && v) initialQueryFilters[k] = v;
      }
      selectEl.innerHTML = DATASETS.map(d => `<option value="${d.id}">${d.label}</option>`).join('');
      const cookieDataset = cookieState?.dataset;
      const wantedDataset = DATASETS.some(d => d.id === q) ? q
        : (DATASETS.some(d => d.id === cookieDataset) ? cookieDataset : 'monster');
      selectEl.value = wantedDataset;
      showDebug = Boolean(cookieState?.showDebug);
      showDebugToggleEl.checked = false;
      showDebugToggleEl.checked = showDebug;
      showDebugToggleEl.addEventListener('change', () => {
        showDebug = showDebugToggleEl.checked;
        saveViewState();
        renderMetaFilters();
        renderRootLists();
        renderNamedTables();
        currentRows = applyMetaFilters(currentBaseRows);
        render(currentRows);
        refreshStatusLoaded();
      });
      selectEl.addEventListener('change', () => {
        const id = selectEl.value;
        const url = new URL(location.href);
        url.searchParams.set('d', id);
        history.replaceState({}, '', url);
        setModePreview();
        activeSortKey = '__none__';
        activeSortOrder = 'asc';
        saveViewState();
        loadOne(id);
      });
      openFileBtn.addEventListener('click', () => openFileForEdit());
      copyPathBtn.addEventListener('click', () => copyCurrentDatasetPath());
      flushBtn.addEventListener('click', () => flushToFile());
      setModePreview();
      currentDatasetId = selectEl.value;
      if (cookieState?.filters && typeof cookieState.filters === 'object') {
        activeMetaFilters = { ...cookieState.filters };
      }
      if (typeof cookieState?.listMode === 'boolean') {
        activeTableListMode = cookieState.listMode;
      }
      loadOne(selectEl.value);
    }

    init();
  </script>
</body>
