<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>甇血</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f7;
      --panel: #ffffff;
      --text: #111111;
      --muted: #666666;
      --line: #dddddd;
      --line-strong: #c7c7c7;
      --shadow: rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #ffffff 0%, #fafafa 16%, var(--bg) 100%);
    }

    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 18px 44px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .kicker {
      display: inline-block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 56px);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    .intro {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      background: rgba(255, 255, 255, 0.85);
    }

    .home-link:hover {
      border-color: var(--line-strong);
      background: #ffffff;
    }

    .status {
      margin: 0 0 16px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      color: var(--muted);
      font-size: 14px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 14px 40px var(--shadow);
    }

    table {
      width: 100%;
      min-width: 1120px;
      border-collapse: collapse;
    }

    thead {
      background: #0f0f0f;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
      line-height: 1.5;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      color: #ffffff;
      background: #0f0f0f;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    tbody tr:nth-child(even) {
      background: #fcfcfc;
    }

    tbody tr:hover {
      background: #f3f3f3;
    }

    .name-cell {
      font-weight: 600;
      white-space: nowrap;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .empty {
      color: #909090;
    }

    .stack {
      display: inline-flex;
      flex-direction: column;
      gap: 2px;
    }

    .stack-key {
      color: var(--muted);
      font-size: 12px;
    }

    code {
      font-family: Consolas, "Courier New", monospace;
    }

    @media (max-width: 720px) {
      .page {
        padding: 20px 12px 36px;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .home-link {
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div>
        <span class="kicker">鞈???/span>
        <h1>甇血</h1>
        <p class="intro">靘 <code>weapon.json</code> ??<code>keys</code> ??<code>items</code> 蝯?憿舐內鞈???/p>
      </div>
      <a class="home-link" href="./index.html">餈?蝝Ｗ?</a>
    </div>

    <p id="status" class="status">頛甇血鞈?銝?..</p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr id="table-head-row"></tr>
        </thead>
        <tbody id="weapon-table-body">
          <tr>
            <td class="empty">頛銝?..</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const tableHeadRow = document.getElementById("table-head-row");
    const tableBody = document.getElementById("weapon-table-body");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function isNumericLike(value) {
      return typeof value === "number";
    }

    function formatValue(value) {
      if (value === null || value === undefined || value === "") {
        return '<span class="empty">-</span>';
      }

      if (Array.isArray(value)) {
        if (value.length === 0) {
          return '<span class="empty">[]</span>';
        }
        return value.map((item) => formatValue(item)).join("<br>");
      }

      if (typeof value === "object") {
        const entries = Object.entries(value);
        if (entries.length === 0) {
          return '<span class="empty">{}</span>';
        }

        return `<span class="stack">${entries.map(([key, nestedValue]) => `
          <span><span class="stack-key">${escapeHtml(key)}嚗?/span>${formatValue(nestedValue)}</span>
        `).join("")}</span>`;
      }

      return escapeHtml(value);
    }

    function renderTable(keys, items) {
      if (!Array.isArray(items) || items.length === 0) {
        tableHeadRow.innerHTML = "";
        tableBody.innerHTML = '<tr><td class="empty">瘝?鞈?</td></tr>';
        return;
      }

      const displayKeys = Array.isArray(keys) && keys.length > 0 ? keys : Object.keys(items[0]);

      tableHeadRow.innerHTML = displayKeys.map((key) => `<th>${escapeHtml(key)}</th>`).join("");

      tableBody.innerHTML = items.map((item) => `
        <tr>
          ${displayKeys.map((key, index) => {
            const value = item[key];
            const className = index === 0 ? "name-cell" : (isNumericLike(value) ? "num" : "");
            return `<td class="${className}">${formatValue(value)}</td>`;
          }).join("")}
        </tr>
      `).join("");
    }

    async function loadWeapons() {
      try {
        const response = await fetch("./?拙?鞈?/weapon.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const keys = Array.isArray(data.keys) ? data.keys : null;
        const items = Array.isArray(data.items) ? data.items : data;

        renderTable(keys, items);
        statusEl.textContent = `撌脰???${Array.isArray(items) ? items.length : 0} 蝑??;
      } catch (error) {
        tableHeadRow.innerHTML = "";
        tableBody.innerHTML = `<tr><td class="empty">頛憭望?嚗?{escapeHtml(error.message)}</td></tr>`;
        statusEl.textContent = "霈??JSON 憭望?";
      }
    }

    loadWeapons();
  </script>
</body>
</html>
