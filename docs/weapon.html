<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Weapon Data</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f7;
      --panel: #ffffff;
      --panel-alt: #f1f1f1;
      --text: #111111;
      --muted: #666666;
      --line: #dddddd;
      --line-strong: #c7c7c7;
      --shadow: rgba(0, 0, 0, 0.06);
      --fire: #111111;
      --cold: #5c5c5c;
      --pierce: #7a7a7a;
      --reap: #2f2f2f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, #ffffff 0%, #fafafa 16%, var(--bg) 100%);
    }

    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 18px 44px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .kicker {
      display: inline-block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 56px);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    .intro {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      background: rgba(255, 255, 255, 0.85);
    }

    .home-link:hover {
      border-color: var(--line-strong);
      background: #ffffff;
    }

    .status {
      margin: 0 0 16px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      color: var(--muted);
      font-size: 14px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 14px 40px var(--shadow);
    }

    table {
      width: 100%;
      min-width: 1040px;
      border-collapse: collapse;
    }

    thead {
      background: #0f0f0f;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
      line-height: 1.45;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      color: #ffffff;
      background: #0f0f0f;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    tbody tr:nth-child(even) {
      background: #fcfcfc;
    }

    tbody tr:hover {
      background: #f3f3f3;
    }

    .weapon {
      font-weight: 600;
      white-space: nowrap;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .chip {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .chip.fire {
      background: var(--fire);
    }

    .chip.cold {
      background: var(--cold);
    }

    .chip.pierce {
      background: var(--pierce);
    }

    .chip.reap {
      background: var(--reap);
    }

    .empty {
      color: #909090;
    }

    code {
      font-family: Consolas, "Courier New", monospace;
    }

    @media (max-width: 720px) {
      .page {
        padding: 20px 12px 36px;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .home-link {
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div>
        <span class="kicker">Data View</span>
        <h1>Weapon Data</h1>
        <p class="intro">Rendered from <code>./物品資料/武器.json</code>.</p>
      </div>
      <a class="home-link" href="./index.html">Back to Index</a>
    </div>

    <p id="status" class="status">Loading weapon data...</p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Weapon</th>
            <th>Physical</th>
            <th>Elemental</th>
            <th>Speed</th>
            <th>Range</th>
            <th>Durability</th>
            <th>Crafting</th>
            <th>Special Effects</th>
          </tr>
        </thead>
        <tbody id="weapon-table-body">
          <tr>
            <td colspan="8" class="empty">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const tableBody = document.getElementById("weapon-table-body");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatValue(value) {
      if (value === null || value === undefined || value === "") {
        return '<span class="empty">-</span>';
      }
      return escapeHtml(value);
    }

    function formatElemental(elemental) {
      if (!elemental || elemental.value === null || elemental.value === undefined) {
        return '<span class="empty">-</span>';
      }

      const type = String(elemental.type || "unknown");
      const lowerType = type.toLowerCase();
      const safeType = escapeHtml(type);
      const safeValue = escapeHtml(elemental.value);
      const chipClass = ["fire", "cold", "pierce", "reap"].includes(lowerType) ? lowerType : "fire";

      return `<span class="chip ${chipClass}">${safeValue} ${safeType}</span>`;
    }

    function renderRows(items) {
      if (!Array.isArray(items) || items.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="8" class="empty">No data</td></tr>';
        return;
      }

      tableBody.innerHTML = items.map((item) => `
        <tr>
          <td class="weapon">${formatValue(item.weapon)}</td>
          <td class="num">${formatValue(item.physical)}</td>
          <td>${formatElemental(item.elemental)}</td>
          <td class="num">${formatValue(item.speed)}</td>
          <td class="num">${formatValue(item.range)}</td>
          <td class="num">${formatValue(item.durability)}</td>
          <td>${formatValue(item.crafting)}</td>
          <td>${formatValue(item.special_effects)}</td>
        </tr>
      `).join("");
    }

    async function loadWeapons() {
      try {
        const response = await fetch("./物品資料/武器.json");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        renderRows(data.items);
        statusEl.textContent = `Loaded ${Array.isArray(data.items) ? data.items.length : 0} weapons`;
      } catch (error) {
        tableBody.innerHTML = `<tr><td colspan="8" class="empty">Failed to load: ${escapeHtml(error.message)}</td></tr>`;
        statusEl.textContent = "Failed to load JSON data";
      }
    }

    loadWeapons();
  </script>
</body>
</html>
