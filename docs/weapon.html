<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Weapons</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f7;
      --panel: #ffffff;
      --text: #111111;
      --muted: #666666;
      --line: #dddddd;
      --line-strong: #c7c7c7;
      --shadow: rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #ffffff 0%, #fafafa 16%, var(--bg) 100%);
    }

    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 18px 44px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .kicker {
      display: inline-block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 56px);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    .intro {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      background: rgba(255, 255, 255, 0.85);
    }

    .home-link:hover {
      border-color: var(--line-strong);
      background: #ffffff;
    }

    .status {
      margin: 0 0 16px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      color: var(--muted);
      font-size: 14px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 14px 40px var(--shadow);
    }

    table {
      width: 100%;
      min-width: 1120px;
      border-collapse: collapse;
    }

    thead {
      background: #0f0f0f;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
      line-height: 1.5;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      color: #ffffff;
      background: #0f0f0f;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    tbody tr:nth-child(even) {
      background: #fcfcfc;
    }

    tbody tr:hover {
      background: #f3f3f3;
    }

    .name-cell {
      font-weight: 600;
      white-space: nowrap;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .empty {
      color: #909090;
    }

    .stack {
      display: inline-flex;
      flex-direction: column;
      gap: 2px;
    }

    .stack-key {
      color: var(--muted);
      font-size: 12px;
    }

    code {
      font-family: Consolas, "Courier New", monospace;
    }

    @media (max-width: 720px) {
      .page {
        padding: 20px 12px 36px;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .home-link {
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div>
        <span class="kicker">資料檢視</span>
        <h1>Weapons</h1>
        <p class="intro">讀取並顯示 weapon.json 的 keys/items 資料。</p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr id="table-head-row"></tr>
        </thead>
        <tbody id="weapon-table-body">
          <tr>
            <td class="empty">載入中...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const tableHeadRow = document.getElementById("table-head-row");
    const tableBody = document.getElementById("weapon-table-body");
    const escapeHtml = (v) => String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");

    function formatValue(v){
      if(v===null||v===undefined||v==="") return '<span class="empty">-</span>';
      if(Array.isArray(v)) return v.map(formatValue).join("<br>");
      if(typeof v === "object") return Object.entries(v).map(([k,n])=>`<span><span class="stack-key">${escapeHtml(k)}: </span>${formatValue(n)}</span>`).join("<br>");
      return escapeHtml(v);
    }

    fetch("./dataset/weapon.json", { cache: "no-store" })
      .then((r)=>{ if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then((data)=>{
        const keys = Array.isArray(data.keys) ? data.keys : [];
        const items = Array.isArray(data.items) ? data.items : [];
        tableHeadRow.innerHTML = keys.map((k)=>`<th>${escapeHtml(k)}</th>`).join("");
        tableBody.innerHTML = items.map((row)=>`<tr>${keys.map((k,i)=>`<td class="${i===0?"name-cell":""}">${formatValue(row[k])}</td>`).join("")}</tr>`).join("");
        statusEl.textContent = `已載入 ${items.length} 筆資料`;
      })
      .catch((e)=>{
        tableHeadRow.innerHTML = "";
        tableBody.innerHTML = `<tr><td class="empty">載入失敗：${escapeHtml(e.message)}</td></tr>`;
        statusEl.textContent = "JSON 載入失敗";
      });
  </script>
</body>
</html>
