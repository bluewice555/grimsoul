<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grim Soul Docs</title>
  <style>
    :root {
      --bg:#0b0f16; --panel:#111824; --text:#eef3fb; --muted:#9aa5b5; --line:#263247; --shadow:rgba(0,0,0,.38);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Segoe UI","Noto Sans TC",sans-serif;color:var(--text);background:radial-gradient(circle at top,rgba(255,255,255,.08),transparent 28%),linear-gradient(180deg,#0d1320 0%,var(--bg) 100%)}
    .page{max-width:980px;margin:0 auto;padding:40px 18px 60px}
    .hero{padding:28px;border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.03),transparent),var(--panel);box-shadow:0 20px 54px var(--shadow)}
    .eyebrow{display:inline-block;color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:10px}
    h1{margin:0;font-size:clamp(38px,7vw,74px);line-height:.95;letter-spacing:-.04em}
    .lead{margin:12px 0 0;color:var(--muted);font-size:14px;line-height:1.7}
    .card{margin-top:20px;display:block;padding:22px;border:1px solid var(--line);border-radius:20px;background:#141d2a;color:inherit;text-decoration:none;box-shadow:0 14px 40px rgba(0,0,0,.28)}
    .card:hover{border-color:#3a4b67}
    .type{display:inline-block;color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px}
    .title{margin:0 0 8px;font-size:30px;line-height:1}
    .desc{margin:0;color:var(--muted);font-size:14px;line-height:1.7}
    .path{margin-top:14px;font-family:Consolas,"Courier New",monospace;color:#d7deeb;font-size:12px}
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <span class="eyebrow">Dataset</span>
      <h1>Grim Soul Docs</h1>
      <p class="lead">展示頁已整合為單一 dataset viewer。後續功能頁會另行提供。</p>
      <a class="card" href="./dataset.html?d=monster">
        <span class="type">Viewer</span>
        <h2 class="title">Dataset</h2>
        <p class="desc">armor items / armor sets / armor sheet / monster / skill / weapon</p>
        <div class="path">./dataset.html</div>
      </a>
      <a class="card" href="./weapon.html">
        <span class="type">Feature</span>
        <h2 class="title">Weapon</h2>
        <p class="desc">武器顯示頁（多彩淺色風格，後續逐步擴充）。</p>
        <div class="path">./weapon.html</div>
      </a>
    </section>
  </main>
</body>
</html>
