<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Grim Soul Docs</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --panel: #111111;
      --panel-soft: #171717;
      --text: #f5f5f5;
      --muted: #a3a3a3;
      --line: #262626;
      --line-strong: #3f3f46;
      --shadow: rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 24%),
        linear-gradient(180deg, #0a0a0a 0%, var(--bg) 42%, #020202 100%);
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 36px 20px 64px;
    }

    .hero {
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
        var(--panel);
      box-shadow: 0 24px 64px var(--shadow);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 10px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 7vw, 84px);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .lead {
      margin: 14px 0 0;
      max-width: 640px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .section {
      margin-top: 26px;
    }

    .section-title {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      display: block;
      min-height: 200px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent),
        var(--panel-soft);
      color: inherit;
      text-decoration: none;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #52525b;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent),
        #1a1a1a;
    }

    .card-type {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .card p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .path {
      color: #d4d4d8;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      word-break: break-all;
    }

    .note {
      margin-top: 18px;
      padding: 14px 0 0;
      border-top: 1px solid var(--line);
      color: #737373;
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .page {
        padding: 20px 14px 42px;
      }

      .hero,
      .card {
        border-radius: 20px;
      }

      h1 {
        font-size: 44px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <span class="eyebrow">首頁</span>
      <h1>Grim Soul Docs</h1>
      <p class="lead">`docs` 資料頁面入口。</p>
    </section>

    <section class="section">
      <h2 class="section-title">頁面</h2>
      <div class="grid">
        <a class="card" href="./weapon.html">
          <span class="card-type">資料檢視</span>
          <h2>武器</h2>
          <p>檢視武器資料與數值。</p>
          <div class="path">./weapon.html</div>
        </a>

        <a class="card" href="./armor.html">
          <span class="card-type">資料檢視</span>
          <h2>防具</h2>
          <p>檢視防具套裝、部件與效果。</p>
          <div class="path">./armor.html</div>
        </a>

        <a class="card" href="./monster.html">
          <span class="card-type">資料檢視</span>
          <h2>怪物</h2>
          <p>檢視怪物資料總表。</p>
          <div class="path">./monster.html</div>
        </a>

        <a class="card" href="./skill.html">
          <span class="card-type">資料檢視</span>
          <h2>技能</h2>
          <p>檢視技能分頁與細節。</p>
          <div class="path">./skill.html</div>
        </a>
      </div>

      <div class="note">僅修復文字亂碼，保留原有風格。</div>
    </section>
  </main>
</body>
</html>
